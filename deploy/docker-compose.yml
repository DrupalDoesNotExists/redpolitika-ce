services:
  redpolitika:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=info
      - ENVIRONMENT=development
      - STATIC_DIR=/frontend/out
      - DB_DRIVER=sqlite
      - DB_DSN=file:/data/redpolitika.db?cache=shared&_journal_mode=WAL
      - RULES_DIR=/etc/redpolitika/rules
      - PLUGINS_DIR=/etc/redpolitika/plugins
    volumes:
      - ../backend/rules:/etc/redpolitika/rules:ro
      - ./plugins:/etc/redpolitika/plugins:ro
      - redpolitika_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  redpolitika_data:
