services:
  redpolitika:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: redpolitika-ce:local
    ports:
      - "8080:8080"
    environment:
      LOG_LEVEL: info
      ENVIRONMENT: development
      RULES_DIR: /etc/redpolitika/rules
      PLUGINS_DIR: /etc/redpolitika/plugins
      PLUGIN_PAGES_FLAGS: "--pages-dir=/etc/redpolitika/pages"
      DB_DRIVER: sqlite
      DB_DSN: file:/data/redpolitika.db?cache=shared&_journal_mode=WAL
    volumes:
      # Mount your YAML rules here (image ships with an empty dir)
      - ./rules:/etc/redpolitika/rules:ro
      - ./plugins:/etc/redpolitika/plugins:ro
      - ./pages:/etc/redpolitika/pages:ro
      - redpolitika_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  redpolitika_data:
