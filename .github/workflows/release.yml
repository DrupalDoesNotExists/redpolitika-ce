# Release: changelog note + push CE image to GHCR on semver tags
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            NOTES=$(git log --pretty=format:'- %s (%h)' "${PREV}..${TAG}")
          else
            NOTES=$(git log --pretty=format:'- %s (%h)' "${TAG}" | head -50)
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$(printf '%s\n\n## Changes\n\n%s\n' "CE release $TAG" "$NOTES")" \
            || gh release edit "$TAG" --notes "$(printf '%s\n\n## Changes\n\n%s\n' "CE release $TAG" "$NOTES")"

  ghcr:
    runs-on: ubuntu-latest
    needs: [release-notes]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER_LC}/redpolitika-ce"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            LICENSE=BSL-1.1
          tags: |
            ${{ steps.meta.outputs.repo }}:latest
            ${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.repo }}:full
