syntax = "proto3";
package identity;
option go_package = "github.com/redpolitika/redpolitika-ce/backend/proto/identity";

service PluginIdentity {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  repeated string capabilities = 1; // dot-separated capability IDs, e.g. "static.pages"
  repeated string methods = 2;      // method names for this plugin
}
